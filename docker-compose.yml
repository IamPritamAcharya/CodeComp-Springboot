services:

  postgres:
    image: postgres:15
    container_name: codecomp-postgres
    environment:
      POSTGRES_DB: codecomp
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:latest
    container_name: codecomp-redis
    ports:
      - "6379:6379"

  rabbitmq:
    image: rabbitmq:3-management
    container_name: codecomp-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 5s
      timeout: 5s
      retries: 5

  judge0:
    image: judge0/judge0:latest
    container_name: codecomp-judge0
    ports:
      - "2358:2358"
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_DB: codecomp
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      REDIS_HOST: redis
    depends_on:
      - postgres
      - redis
    privileged: true
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw

  judge0-worker:
    image: judge0/judge0:latest
    container_name: codecomp-judge0-worker
    command: bash -c "QUEUE=* bundle exec rake resque:work"
    depends_on:
      - judge0
      - redis
      - postgres
    environment:
      REDIS_HOST: redis
      POSTGRES_HOST: postgres
      POSTGRES_DB: codecomp
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    privileged: true 
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw

  backend:
    build: .
    container_name: codecomp-backend
    env_file:
      - .env
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_started
      redis:
        condition: service_started
      judge0:
        condition: service_started
    ports:
      - "8081:8081"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/codecomp
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres

      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379

      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: guest
      SPRING_RABBITMQ_PASSWORD: guest

volumes:
  postgres_data:
